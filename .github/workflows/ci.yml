name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore with security audit
        run: dotnet restore Booking.sln /p:NuGetAudit=true "/p:WarningsAsErrors=NU1901;NU1902;NU1903;NU1904"
      - run: dotnet build Booking.sln --configuration Release --no-restore
      - run: dotnet test backend/Booking.Tests/Booking.Tests.csproj --configuration Release --no-build
